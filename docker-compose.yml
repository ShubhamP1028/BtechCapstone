# docker-compose.yml — Project ADITI full-stack deployment
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker-compose up --build        # build images & start containers
#   docker-compose up --build -d     # same, detached
#   docker-compose down              # stop & remove containers
#   docker-compose logs -f           # tail logs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Flask ML backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: shubhamp1028/aditi-backend:latest
    container_name: aditi-backend
    restart: unless-stopped
    environment:
      - MODEL_PATH=/app/regular_spiking_model.pt
      - FLASK_ENV=production
    volumes:
      - ./regular_spiking_model.pt:/app/regular_spiking_model.pt:ro
    ports:
      - "127.0.0.1:5050:1028"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:1028/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── React/Vite frontend (nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: shubhamp1028/aditi-frontend:latest
    container_name: aditi-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: aditi-network
